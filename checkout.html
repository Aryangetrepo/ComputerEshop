<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Checkout | COPA Smart Store</title><link rel="stylesheet" href="css/style.css" /></head><body>
<header class="site-header"><nav class="navbar container"> <img src="assets/images/logo.png" alt="logo" width="200px" height="150px"><button class="menu-toggle" id="menuToggle">☰</button><ul class="nav-links" id="navLinks"><li><a href="index.html">Home</a></li><li><a href="products.html">Products</a></li><li><a href="cart.html">Cart <span class="cart-count">0</span></a></li><li><a class="active" href="checkout.html">Checkout</a></li></ul></nav></header>
<main class="container page-section checkout-page"><div class="page-title"><h1>Checkout</h1><p>Fill customer details to place a demo order.</p></div><form id="checkoutForm" class="checkout-form" novalidate><label>Full Name<input name="name" type="text" placeholder="Enter full name" required /></label><label>Email<input name="email" type="email" placeholder="example@mail.com" required /></label><label>Mobile Number<input name="mobile" type="tel" placeholder="10 digit mobile number" pattern="[0-9]{10}" required /></label><label>Address<textarea name="address" rows="4" placeholder="Enter delivery address" required></textarea></label><label>Payment Mode<select name="payment" required><option value="">Select payment mode</option><option>Cash on Delivery</option><option>UPI</option><option>Debit Card</option></select></label><button class="btn primary" type="submit">Place Order</button><p id="formMessage" class="form-message"></p></form></main>
<footer class="footer"><p>© 2026 Aryan Computer Systems</p></footer><script src="js/products-data.js"></script><script src="js/app.js"></script></body></html>
